<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BW Quiz</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: monospace; background: #111; color: #ccc; margin: 0; padding: 24px; }

  nav { display: flex; gap: 20px; margin-bottom: 28px; border-bottom: 1px solid #222; padding-bottom: 14px; }
  nav button {
    background: none; border: none; font-family: monospace; font-size: 1em;
    color: #555; cursor: pointer; padding: 0;
  }
  nav button:hover { color: #aaa; }
  nav button.active { color: #f0c040; }

  .page { display: none; }
  .page.visible { display: block; }

  /* ── Quiz ── */
  #quiz-wrap { max-width: 440px; }
  h1 { color: #f0c040; margin: 0 0 4px 0; }
  #progress { color: #555; margin-bottom: 24px; font-size: 0.9em; }
  #question { font-size: 1.3em; margin-bottom: 20px; }
  .unit-name { color: #fff; font-weight: bold; }
  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choices button {
    background: #1a1a1a; border: 1px solid #333; color: #ccc;
    padding: 12px 16px; font-size: 1em; font-family: monospace;
    cursor: pointer; text-align: left; border-radius: 3px;
  }
  .choices button:hover:not(:disabled) { background: #252525; border-color: #666; }
  .choices button.correct { background: #1a3a1a; border-color: #4caf50; color: #4caf50; }
  .choices button.wrong   { background: #3a1a1a; border-color: #f44336; color: #f44336; }
  #result { margin-top: 14px; font-size: 1em; min-height: 1.4em; }
  #next-btn {
    display: none; margin-top: 14px;
    background: #222; border: 1px solid #666; color: #ccc;
    padding: 10px 20px; font-size: 1em; font-family: monospace; cursor: pointer; border-radius: 3px;
  }
  #next-btn:hover { background: #2e2e2e; }
  #score-screen { display: none; }
  #score-screen h2 { color: #f0c040; font-size: 2.2em; margin: 0 0 8px 0; }
  #restart-btn {
    margin-top: 20px; background: #222; border: 1px solid #666; color: #ccc;
    padding: 10px 24px; font-size: 1em; font-family: monospace; cursor: pointer; border-radius: 3px;
  }
  #restart-btn:hover { background: #2e2e2e; }
  #seed-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; color: #555; font-size: 0.85em; }
  #seed-row input {
    background: #1a1a1a; border: 1px solid #333; color: #aaa; font-family: monospace;
    font-size: 0.95em; padding: 4px 8px; border-radius: 3px; width: 90px;
  }
  #seed-row input:focus { outline: none; border-color: #555; color: #ddd; }
  #new-seed-btn {
    background: none; border: 1px solid #333; color: #555; font-family: monospace;
    font-size: 0.8em; padding: 3px 8px; cursor: pointer; border-radius: 3px;
  }
  #new-seed-btn:hover { border-color: #666; color: #aaa; }

  /* ── Glossary ── */
  #glossary-wrap { display: flex; gap: 24px; height: calc(100vh - 100px); }

  .sidebar { width: 240px; flex-shrink: 0; overflow-y: auto; }
  .race-section { margin-bottom: 18px; }
  .race-label {
    font-size: 0.68em; text-transform: uppercase; letter-spacing: 2px;
    margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid #1e1e1e;
  }
  .race-label.Terran  { color: #4a82be; }
  .race-label.Protoss { color: #a08820; }
  .race-label.Zerg    { color: #7030a0; }
  .type-label { font-size: 0.63em; text-transform: uppercase; letter-spacing: 1px; color: #3a3a3a; margin: 8px 0 3px 0; }
  .unit-list { list-style: none; margin: 0; padding: 0; }
  .unit-list li button {
    background: none; border: none; color: #888; font-family: monospace;
    font-size: 0.88em; cursor: pointer; padding: 3px 6px;
    width: 100%; text-align: left; border-radius: 2px;
  }
  .unit-list li button:hover   { background: #1c1c1c; color: #ddd; }
  .unit-list li button.active  { background: #1e1e1e; color: #f0c040; }

  .detail-panel {
    flex: 1; background: #151515; border: 1px solid #222;
    border-radius: 4px; padding: 30px; overflow-y: auto;
  }
  .detail-placeholder { color: #333; text-align: center; margin-top: 80px; }
  .detail-name { font-size: 1.9em; color: #fff; margin: 0 0 4px 0; }
  .detail-meta { font-size: 0.82em; margin-bottom: 28px; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; }
  .stat-box { background: #1c1c1c; border: 1px solid #252525; border-radius: 3px; padding: 14px 16px; }
  .stat-label { font-size: 0.68em; text-transform: uppercase; letter-spacing: 1px; color: #444; margin-bottom: 6px; }
  .stat-value { font-size: 1.35em; color: #ddd; }
  .stat-value.hl { color: #f0c040; }
</style>
</head>

<nav>

      <button id="next-btn">Next &rarr;</button>
    </div>
    <div id="score-screen">

      <button id="restart-btn">Play Again</button>
    </div>
  </div>
</div>

<!-- ── GLOSSARY PAGE ── -->
<div id="page-glossary" class="page">

const units = data.filter(d => d.type === 'Unit');

// ─────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('visible'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('visible');
  document.getElementById('nav-' + page).classList.add('active');
  location.hash = page;
}

// ─────────────────────────────────────────
// QUIZ
// ─────────────────────────────────────────
const allTimes = [...new Set(units.map(u => u.buildTime))].sort((a, b) => a - b);

let questions, current, score, rng;

function mulberry32(seed) {
  return () => {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function randInt(max) { return Math.floor(rng() * max); }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = randInt(i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function randomSeed() { return Math.floor(Math.random() * 1e9); }

function applyNewSeed() {
  document.getElementById('seed-input').value = randomSeed();
  startQuiz();
}

function startQuiz() {
  const raw = parseInt(document.getElementById('seed-input').value);
  const seed = isNaN(raw) ? randomSeed() : raw;
  document.getElementById('seed-input').value = seed;
  rng = mulberry32(seed);
  questions = shuffle(units).slice(0, 10);
  current = 0;
  score = 0;
  document.getElementById('score-screen').style.display = 'none';
  document.getElementById('quiz-inner').style.display = 'block';
  showQuestion();
}

function makeChoices(correct) {
  const wrong = shuffle(allTimes.filter(t => t !== correct)).slice(0, 3);
  return shuffle([correct, ...wrong]);
}

function showQuestion() {
  const q = questions[current];
  document.getElementById('progress').textContent = `Question ${current + 1} / 10`;
  document.getElementById('unit-name').textContent = q.name;
  document.getElementById('result').textContent = '';
  document.getElementById('next-btn').style.display = 'none';

  const container = document.getElementById('choices');
  container.innerHTML = '';
  makeChoices(q.buildTime).forEach(t => {
    const btn = document.createElement('button');
    btn.textContent = t + 's';
    btn.onclick = () => answer(btn, t, q.buildTime, container);
    container.appendChild(btn);
  });
}

function answer(btn, chosen, correct, container) {
  [...container.querySelectorAll('button')].forEach(b => b.disabled = true);
  const result = document.getElementById('result');
  if (chosen === correct) {
    btn.classList.add('correct');
    result.textContent = 'Correct!';
    result.style.color = '#4caf50';
    score++;
  } else {
    btn.classList.add('wrong');
    [...container.querySelectorAll('button')].forEach(b => {
      if (parseFloat(b.textContent) === correct) b.classList.add('correct');
    });
    result.textContent = `Wrong. It's ${correct}s.`;
    result.style.color = '#f44336';
  }
  document.getElementById('next-btn').style.display = 'inline-block';
}

document.getElementById('next-btn').onclick = () => {
  current++;
  if (current < 10) {
    showQuestion();
  } else {
    document.getElementById('quiz-inner').style.display = 'none';
    document.getElementById('score-screen').style.display = 'block';
    document.getElementById('final-score').textContent = `${score} / 10`;
    const msgs = ['Keep practicing!', 'Getting there.', 'Not bad!', 'GG EZ!'];
    document.getElementById('final-msg').textContent = msgs[Math.floor(score / 3)];
  }
};

document.getElementById('restart-btn').onclick = startQuiz;

// ─────────────────────────────────────────
// GLOSSARY
// ─────────────────────────────────────────
const raceColor = { Terran: '#4a82be', Protoss: '#a08820', Zerg: '#7030a0' };
let activeGBtn = null;

function buildSidebar() {
  const sidebar = document.getElementById('g-sidebar');
  ['Terran', 'Protoss', 'Zerg'].forEach(race => {
    const section = document.createElement('div');
    section.className = 'race-section';

    const label = document.createElement('div');
    label.className = `race-label ${race}`;
    label.textContent = race;
    section.appendChild(label);

    ['Unit', 'Building'].forEach(type => {
      const items = data.filter(d => d.race === race && d.type === type);
      if (!items.length) return;

      const tl = document.createElement('div');
      tl.className = 'type-label';
      tl.textContent = type + 's';
      section.appendChild(tl);

      const ul = document.createElement('ul');
      ul.className = 'unit-list';
      items.forEach(item => {
        const li = document.createElement('li');
        const btn = document.createElement('button');
        btn.textContent = item.name;
        btn.onclick = () => {
          if (activeGBtn) activeGBtn.classList.remove('active');
          btn.classList.add('active');
          activeGBtn = btn;
          renderDetail(item);
        };
        li.appendChild(btn);
        ul.appendChild(li);
      });
      section.appendChild(ul);
    });

    sidebar.appendChild(section);
  });
}

function renderDetail(item) {
  const supplyRow = item.supplyCost > 0
    ? `<div class="stat-box"><div class="stat-label">Supply</div><div class="stat-value">${item.supplyCost}</div></div>`
    : '';

  const produces = data.filter(d => d.builtFrom === item.name);
  const producesSection = produces.length ? `
    <div style="margin-top:28px">
      <div style="font-size:0.68em;text-transform:uppercase;letter-spacing:1px;color:#444;margin-bottom:12px">Produces</div>
      <div style="display:flex;flex-direction:column;gap:12px">
        ${produces.map(u => {
          const supplyCell = u.supplyCost > 0
            ? `<div class="stat-box"><div class="stat-label">Supply</div><div class="stat-value">${u.supplyCost}</div></div>`
            : '';
          return `
          <div style="border:1px solid #1e1e1e;border-radius:3px;padding:14px 16px;background:#131313">
            <div style="font-size:1.1em;color:#ddd;margin-bottom:12px">${u.name}</div>
            <div class="stats-grid">
              <div class="stat-box"><div class="stat-label">Build Time</div><div class="stat-value hl">${u.buildTime}s</div></div>
              <div class="stat-box"><div class="stat-label">Minerals</div><div class="stat-value">${u.mineralCost}</div></div>
              <div class="stat-box"><div class="stat-label">Gas</div><div class="stat-value">${u.gasCost}</div></div>
              ${supplyCell}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>` : '';

  document.getElementById('g-detail').innerHTML = `
    <div class="detail-name">${item.name}</div>
    <div class="detail-meta" style="color:${raceColor[item.race]}">${item.race} &mdash; ${item.type}</div>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-label">Build Time</div><div class="stat-value hl">${item.buildTime}s</div></div>
      <div class="stat-box"><div class="stat-label">Minerals</div><div class="stat-value">${item.mineralCost}</div></div>
      <div class="stat-box"><div class="stat-label">Gas</div><div class="stat-value">${item.gasCost}</div></div>
      ${supplyRow}
      <div class="stat-box"><div class="stat-label">Built From</div><div class="stat-value" style="font-size:0.95em">${item.builtFrom}</div></div>
    </div>
    ${producesSection}
  `;
}

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
buildSidebar();
document.getElementById('seed-input').value = randomSeed();
startQuiz();

const hash = location.hash.replace('#', '');
if (hash === 'glossary') showPage('glossary');
</script>
