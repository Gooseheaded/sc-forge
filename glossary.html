<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BW Glossary</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: monospace; background: #111; color: #ccc; margin: 0; padding: 20px; }
  nav { margin-bottom: 24px; }
  nav a { color: #888; text-decoration: none; margin-right: 16px; }
  nav a:hover { color: #ccc; }
  nav a.active { color: #f0c040; }
  h1 { color: #f0c040; margin: 0 0 20px 0; }

  .layout { display: flex; gap: 20px; }

  .sidebar { width: 260px; flex-shrink: 0; }

  .race-section { margin-bottom: 20px; }
  .race-label {
    font-size: 0.7em;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #555;
    margin-bottom: 6px;
    padding-bottom: 4px;
    border-bottom: 1px solid #222;
  }
  .race-label.terran { color: #5b9bd5; }
  .race-label.protoss { color: #b59a2a; }
  .race-label.zerg { color: #7a3fa0; }

  .type-label {
    font-size: 0.65em;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #444;
    margin: 8px 0 4px 0;
  }

  .unit-list { list-style: none; margin: 0; padding: 0; }
  .unit-list li button {
    background: none;
    border: none;
    color: #aaa;
    font-family: monospace;
    font-size: 0.9em;
    cursor: pointer;
    padding: 3px 6px;
    width: 100%;
    text-align: left;
    border-radius: 2px;
  }
  .unit-list li button:hover { background: #1e1e1e; color: #fff; }
  .unit-list li button.selected { background: #222; color: #f0c040; }

  .detail-panel {
    flex: 1;
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 4px;
    padding: 28px;
    min-height: 300px;
  }

  .placeholder { color: #444; font-size: 0.95em; margin-top: 60px; text-align: center; }

  .detail-name { font-size: 1.8em; color: #fff; margin: 0 0 4px 0; }
  .detail-meta { color: #555; font-size: 0.85em; margin-bottom: 28px; }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
  }
  .stat-box {
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    border-radius: 3px;
    padding: 14px 16px;
  }
  .stat-label { font-size: 0.7em; text-transform: uppercase; letter-spacing: 1px; color: #555; margin-bottom: 6px; }
  .stat-value { font-size: 1.4em; color: #e0e0e0; }
  .stat-value.highlight { color: #f0c040; }
</style>
</head>
<body>

<nav>
  <a href="index.html">Quiz</a>

</nav>

const races = ["Terran", "Protoss", "Zerg"];
const raceClass = {Terran:"terran", Protoss:"protoss", Zerg:"zerg"};

let selected = null;

function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  races.forEach(race => {
    const section = document.createElement('div');
    section.className = 'race-section';

    const label = document.createElement('div');
    label.className = `race-label ${raceClass[race]}`;
    label.textContent = race;
    section.appendChild(label);

    ['Unit', 'Building'].forEach(type => {
      const items = data.filter(d => d.race === race && d.type === type);
      if (!items.length) return;

      const typeLabel = document.createElement('div');
      typeLabel.className = 'type-label';
      typeLabel.textContent = type + 's';
      section.appendChild(typeLabel);

      const ul = document.createElement('ul');
      ul.className = 'unit-list';
      items.forEach(item => {
        const li = document.createElement('li');
        const btn = document.createElement('button');
        btn.textContent = item.name;
        btn.dataset.name = item.name;
        btn.onclick = () => selectItem(item, btn);
        li.appendChild(btn);
        ul.appendChild(li);
      });
      section.appendChild(ul);
    });

    sidebar.appendChild(section);
  });
}

function selectItem(item, btn) {
  if (selected) selected.classList.remove('selected');
  btn.classList.add('selected');
  selected = btn;
  renderDetail(item);
}

function renderDetail(item) {
  const raceColor = {Terran:'#5b9bd5', Protoss:'#b59a2a', Zerg:'#7a3fa0'};
  const panel = document.getElementById('detail');
  panel.innerHTML = `
    <div class="detail-name">${item.name}</div>
    <div class="detail-meta" style="color:${raceColor[item.race]}">${item.race} &mdash; ${item.type}</div>
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-label">Build Time</div>
        <div class="stat-value highlight">${item.buildTime}s</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Minerals</div>
        <div class="stat-value">${item.mineralCost}</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Gas</div>
        <div class="stat-value">${item.gasCost}</div>
      </div>
      ${item.supplyCost > 0 ? `
      <div class="stat-box">
        <div class="stat-label">Supply</div>
        <div class="stat-value">${item.supplyCost}</div>
      </div>` : ''}
      <div class="stat-box">
        <div class="stat-label">Built From</div>
        <div class="stat-value" style="font-size:1em">${item.builtFrom}</div>
      </div>
    </div>
  `;
}

buildSidebar();
