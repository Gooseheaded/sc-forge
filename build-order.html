<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BW Build Order Creator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: monospace; background: #111; color: #ccc;
  display: flex; flex-direction: column; height: 100vh; overflow: hidden;
}

/* ── Nav ── */
nav {
  display: flex; gap: 20px; padding: 14px 24px;
  border-bottom: 1px solid #1e1e1e; flex-shrink: 0;
}
nav a { color: #555; text-decoration: none; font-size: 1em; }
nav a:hover { color: #aaa; }
nav a.active { color: #f0c040; }

/* ── App shell ── */
#app { display: flex; flex: 1; overflow: hidden; }

/* ── Asset panel ── */
#asset-panel {
  width: 196px; flex-shrink: 0; border-right: 1px solid #1e1e1e;
  display: flex; flex-direction: column; overflow: hidden;
}
#search-box {
  background: #151515; border: none; border-bottom: 1px solid #1e1e1e;
  color: #ccc; font-family: monospace; font-size: 0.83em;
  padding: 10px 12px; outline: none; flex-shrink: 0;
}
#search-box::placeholder { color: #383838; }
#asset-list { flex: 1; overflow-y: auto; }

/* Section headers (Terran Units, Terran Buildings…) */
.asset-group {
  font-size: 0.6em; text-transform: uppercase; letter-spacing: 2px;
  padding: 10px 12px 3px; color: #2a2a2a;
}

/* Clickable row shared base */
.asset-item {
  display: flex; align-items: center; gap: 7px;
  cursor: pointer; font-size: 0.82em; color: #666;
  border-left: 2px solid transparent; padding: 5px 12px;
}
.asset-item:hover { background: #161616; color: #ccc; border-left-color: currentColor; }

/* Indent levels */
.asset-item.lvl1 { padding-left: 22px; }
.asset-item.lvl2 { padding-left: 34px; }

/* Building toggle row (not itself clickable-to-add) */
.tree-building {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 12px; font-size: 0.82em; color: #555;
  user-select: none; cursor: pointer;
}
.tree-building:hover { background: #161616; color: #999; }
.tree-caret { font-size: 0.6em; color: #333; width: 10px; flex-shrink: 0; line-height: 1; }
.tree-building-name { flex: 1; }
.tree-building-time { font-size: 0.75em; color: #2a2a2a; }

/* Collapsible children */
.tree-children { display: none; }
.tree-children.open { display: block; }

.dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.asset-time { margin-left: auto; font-size: 0.8em; color: #333; }

/* ── Main ── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* ── Toolbar ── */
#toolbar {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; border-bottom: 1px solid #1e1e1e; flex-shrink: 0;
}
.tbtn {
  background: none; border: 1px solid #252525; color: #555;
  font-family: monospace; font-size: 0.75em; padding: 4px 9px;
  cursor: pointer; border-radius: 3px;
}
.tbtn:hover { border-color: #555; color: #aaa; }
#zoom-info { font-size: 0.72em; color: #2e2e2e; padding: 0 4px; }
.tbtn-danger:hover { border-color: #f44336; color: #f44336; }

/* ── Timeline wrapper ── */
#tl-wrap { display: flex; flex: 1; overflow: hidden; min-height: 0; }

/* Fixed label column */
#label-col {
  width: 52px; flex-shrink: 0; display: flex; flex-direction: column;
  background: #111; border-right: 1px solid #1a1a1a; z-index: 20;
}
#label-ruler-spacer {
  height: 26px; flex-shrink: 0; border-bottom: 1px solid #1a1a1a;
  background: #0e0e0e;
}
#label-supply-cell {
  height: 28px; flex-shrink: 0; border-bottom: 1px solid #1e1e1e;
  background: #0c0c0c; display: flex; align-items: center;
  justify-content: flex-end; padding-right: 8px;
  font-size: 0.58em; color: #2a5a2a; text-transform: uppercase;
  letter-spacing: 1px; user-select: none;
}
#label-list { overflow: hidden; flex: 1; }
.label-cell {
  height: 42px; display: flex; align-items: center; justify-content: flex-end;
  padding-right: 8px; font-size: 0.62em; color: #2e2e2e;
  border-bottom: 1px solid #1a1a1a; letter-spacing: 1px;
  text-transform: uppercase; user-select: none;
}

/* Scrollable timeline */
#tl-scroll { flex: 1; overflow: auto; position: relative; }
#tl-inner { position: relative; /* width set by JS */ }

/* Ruler */
#ruler {
  height: 26px; position: sticky; top: 0; z-index: 10;
  background: #0e0e0e; border-bottom: 1px solid #1a1a1a;
  /* width set by JS */
}
.tick { position: absolute; bottom: 0; width: 1px; background: #1e1e1e; }
.tick.major { background: #2a2a2a; height: 100%; }
.tick-label {
  position: absolute; font-size: 0.6em; color: #3a3a3a;
  bottom: 5px; transform: translateX(-50%); white-space: nowrap;
}

/* Supply row */
#supply-row {
  height: 28px; position: relative; background: #0c0c0c;
  border-bottom: 1px solid #1e1e1e; overflow: hidden;
}
.sup-seg {
  position: absolute; top: 0; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.6em; font-family: monospace; pointer-events: none;
  white-space: nowrap; overflow: hidden;
}
.sup-ok   { background: #0d1a0d; color: #2a6a2a; }
.sup-warn { background: #1a1a00; color: #7a7a00; }
.sup-over { background: #1a0a0a; color: #8a2a2a; }
.sup-zero { color: #2a2a2a; }
/* Zero-time marker */
.tick-zero { position: absolute; bottom: 0; width: 1px; background: #3a3a3a; height: 100%; z-index: 2; }
.tick-zero-label { position: absolute; bottom: 5px; font-size: 0.65em; color: #555; transform: translateX(-50%); }

/* Track rows */
#tracks { position: relative; /* width set by JS */ }
.track-row {
  height: 42px; position: relative; border-bottom: 1px solid #141414;
  background: #111;
}
.track-row.drag-over { background: #151515; }

/* Blocks */
.bl {
  position: absolute; top: 3px; height: 36px;
  border-radius: 2px; cursor: grab; user-select: none;
  overflow: hidden; display: flex; align-items: center; padding: 0 5px;
  font-size: 0.7em; white-space: nowrap;
}
.bl:hover { filter: brightness(1.25); }
.bl span { overflow: hidden; text-overflow: ellipsis; pointer-events: none; }

/* Ghost (drag preview) */
#ghost {
  position: fixed; pointer-events: none; z-index: 9999;
  display: none; opacity: 0.85;
  border-radius: 2px; height: 36px; align-items: center; padding: 0 7px;
  font-size: 0.7em; white-space: nowrap; overflow: hidden;
  flex-direction: column; justify-content: center; gap: 1px;
}
#ghost-name { font-size: 1em; }
#ghost-time { font-size: 0.8em; opacity: 0.7; }

/* ── Tooltip ── */
#tip {
  position: fixed; background: #1c1c1c; border: 1px solid #2a2a2a;
  padding: 7px 10px; font-size: 0.75em; color: #aaa; line-height: 1.7;
  border-radius: 3px; pointer-events: none; z-index: 5000; display: none;
}

/* ── Context menu ── */
#ctx {
  position: fixed; background: #1c1c1c; border: 1px solid #2a2a2a;
  border-radius: 3px; z-index: 5000; display: none; min-width: 120px;
}
#ctx button {
  display: block; width: 100%; background: none; border: none;
  color: #aaa; font-family: monospace; font-size: 0.82em;
  padding: 8px 14px; cursor: pointer; text-align: left;
}
#ctx button:hover { background: #2a2a2a; color: #f44336; }

/* ── Saves dropdown ── */
#saves-panel {
  position: fixed; background: #1c1c1c; border: 1px solid #2a2a2a;
  border-radius: 3px; z-index: 5000; display: none; min-width: 220px;
  max-height: 320px; overflow-y: auto;
}
.save-row {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 10px; border-bottom: 1px solid #1a1a1a;
}
.save-row:last-child { border-bottom: none; }
.save-name {
  flex: 1; font-size: 0.78em; color: #aaa; font-family: monospace;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.save-btn {
  background: none; border: 1px solid #252525; color: #555;
  font-family: monospace; font-size: 0.7em; padding: 2px 7px;
  cursor: pointer; border-radius: 3px; flex-shrink: 0;
}
.save-btn:hover { border-color: #555; color: #aaa; }
.save-btn.del:hover { border-color: #f44336; color: #f44336; }
#saves-empty {
  padding: 14px 16px; font-size: 0.75em; color: #333; font-family: monospace;
}

/* ── Build order ── */
#bo-section {
  border-top: 1px solid #1e1e1e; flex-shrink: 0;
  display: flex; flex-direction: column; height: 160px; position: relative;
  resize: vertical; overflow: hidden; min-height: 80px; max-height: 60vh;
}
#bo-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 14px; border-bottom: 1px solid #1a1a1a; flex-shrink: 0;
}
#bo-header span { font-size: 0.65em; text-transform: uppercase; letter-spacing: 2px; color: #333; }
#bo-hint { font-size: 0.62em; color: #2a2a2a; margin-left: 10px; }
#bo-text {
  flex: 1; background: #0c0c0c; color: #888; font-family: monospace;
  font-size: 0.82em; border: none; resize: none; padding: 8px 14px;
  outline: none; overflow-y: auto; line-height: 1.6;
}
#bo-text:focus { color: #bbb; }
.bo-invalid { color: #f44336 !important; }

/* ── Autocomplete dropdown ── */
#ac {
  position: fixed; z-index: 6000; display: none;
  background: #1a1a1a; border: 1px solid #2e2e2e;
  border-radius: 3px; overflow: hidden; min-width: 180px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.6);
}
.ac-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px; cursor: pointer; font-size: 0.8em;
  color: #777; white-space: nowrap;
}
.ac-item:hover, .ac-item.ac-sel { background: #252525; color: #ddd; }
.ac-item .ac-race { font-size: 0.75em; color: #444; margin-left: auto; padding-left: 10px; }
.ac-item .ac-time { font-size: 0.75em; color: #333; }

/* Mirror div for cursor position measurement */
#ta-mirror {
  position: fixed; visibility: hidden; pointer-events: none; z-index: -1;
  white-space: pre-wrap; word-break: break-word; overflow: hidden;
  font-family: monospace; font-size: 0.82em; line-height: 1.6;
  padding: 8px 14px;
}
</style>
</head>

      <div id="tl-scroll">

          <div id="ruler"></div>
          <div id="supply-row"></div>
          <div id="tracks"></div>
        </div>
      </div>
    </div>

    <!-- Build order -->
    <div id="bo-section">
      <div id="bo-header">
        <span>Build Order</span>
        <span id="bo-hint">M:SS  Name [-> Name2]  —  (t) for track  —  Tab to autocomplete</span>
        <button class="tbtn" onclick="copyBO(this)">Copy</button>
      </div>
      <textarea id="bo-text" spellcheck="false"
        oninput="onBOInput()"
        onkeydown="onBOKey(event)"></textarea>
    </div>

  </div>
</div>

<!-- Ghost drag element -->
<div id="ghost"></div>

<!-- Autocomplete dropdown -->
<div id="ac"></div>

<!-- Mirror div for textarea cursor measurement -->
<div id="ta-mirror"></div>

<!-- Tooltip -->
<div id="tip"></div>

<!-- Context menu -->
<div id="ctx">
  <button id="ctx-remove">Remove</button>
</div>

<div id="saves-panel"></div>

// Returns { min, max } in game-seconds. min may be negative.
function timeRange() {
  const items = tracks.flat();
  const earliest = items.length ? Math.min(...items.map(it => it.startTime)) : 0;
  const latest   = items.length ? Math.max(...items.map(it => it.startTime + it.buildTime)) : 0;
  return {
    min: earliest < 0 ? earliest - 10 : 0,
    max: Math.max(MIN_DUR, latest + WIGGLE),
  };
}

// Returns true if item or any of its descendants match the query
function treeMatches(item, lq) {
  if (!lq) return true;
  if (item.name.toLowerCase().includes(lq)) return true;
  return DATA.some(child => child.builtFrom === item.name && treeMatches(child, lq));
}

// Build a clickable leaf row (unit / addon / upgrade)
function makeLeafRow(item, level, color) {
  const row = document.createElement('div');
  row.className = `asset-item lvl${level}`;
  row.style.color = color;

  const dot = document.createElement('span');
  dot.className = 'dot';
  if (item.type === 'Addon') {
    dot.style.background = 'transparent';
    dot.style.border = `1px solid ${color}`;
  } else if (item.type === 'Upgrade') {
    dot.style.background = 'transparent';
    dot.style.border = `1px dashed ${color}`;
    dot.style.borderRadius = '1px'; // square-ish for upgrades
  } else {
    dot.style.background = color;
  }
  row.appendChild(dot);

  const nm = document.createElement('span');
  nm.textContent = item.name;
  nm.style.flex = '1';
  row.appendChild(nm);

  const t = document.createElement('span');
  t.className = 'asset-time';
  t.textContent = item.buildTime + 's';
  row.appendChild(t);

  row.onclick = () => addItem(item);
  return row;
}

// Build a collapsible building row with nested addons/upgrades
function makeBuildingTree(building, lq, color, forceOpen) {
  const addons    = DATA.filter(d => d.builtFrom === building.name && d.type === 'Addon');
  const upgrades  = DATA.filter(d => d.builtFrom === building.name && d.type === 'Upgrade')
                        .filter(d => treeMatches(d, lq));
  const hasChildren = addons.some(a => treeMatches(a, lq)) || upgrades.length > 0;

  const wrap = document.createElement('div');

  // Building toggle row — clicking it adds the building AND toggles children
  const toggle = document.createElement('div');
  toggle.className = 'tree-building';
  toggle.style.color = color;

  const caret = document.createElement('span');
  caret.className = 'tree-caret';
  caret.textContent = hasChildren ? '▶' : '';
  toggle.appendChild(caret);

  const dot = document.createElement('span');
  dot.className = 'dot';
  dot.style.background = color;
  toggle.appendChild(dot);

  const nm = document.createElement('span');
  nm.className = 'tree-building-name';
  nm.textContent = building.name;
  toggle.appendChild(nm);

  const t = document.createElement('span');
  t.className = 'tree-building-time';
  t.textContent = building.buildTime + 's';
  toggle.appendChild(t);

  wrap.appendChild(toggle);

  // Children container
  const children = document.createElement('div');
  children.className = 'tree-children' + (forceOpen ? ' open' : '');
  if (forceOpen && hasChildren) caret.textContent = '▼';

  // Toggle expand on caret click; add building on name click
  toggle.addEventListener('click', e => {
    if (!hasChildren) { addItem(building); return; }
    const open = children.classList.toggle('open');
    caret.textContent = open ? '▼' : '▶';
    // Click on the name/dot part also adds the building
    if (!e.target.closest('.tree-caret')) addItem(building);
  });

  // Direct upgrades under building
  upgrades.forEach(u => children.appendChild(makeLeafRow(u, 1, color)));

  // Addons under building, each with their own upgrades
  addons.filter(a => treeMatches(a, lq)).forEach(addon => {
    const addonUpgrades = DATA.filter(d => d.builtFrom === addon.name && d.type === 'Upgrade')
                              .filter(d => treeMatches(d, lq));

    children.appendChild(makeLeafRow(addon, 1, color));

    addonUpgrades.forEach(u => children.appendChild(makeLeafRow(u, 2, color)));
  });

  wrap.appendChild(children);
  return wrap;
}

function buildAssetPanel(q = '') {
  const list = document.getElementById('asset-list');
  list.innerHTML = '';
  const lq = q.toLowerCase().trim();
  const forceOpen = lq.length > 0; // auto-expand when searching

  ['Terran','Protoss','Zerg'].forEach(race => {
    const color = RACE_COLOR[race] + 'bb';

    // ── Units ──
    const units = DATA.filter(d => d.race === race && d.type === 'Unit' && treeMatches(d, lq));
    if (units.length) {
      const grp = document.createElement('div');
      grp.className = 'asset-group';
      grp.textContent = `${race} Units`;
      grp.style.color = RACE_COLOR[race] + '70';
      list.appendChild(grp);
      units.forEach(u => list.appendChild(makeLeafRow(u, 0, color)));
    }

    // ── Buildings (with nested addons + upgrades) ──
    const buildings = DATA.filter(d => d.race === race && d.type === 'Building' && treeMatches(d, lq));
    if (buildings.length) {
      const grp = document.createElement('div');
      grp.className = 'asset-group';
      grp.textContent = `${race} Buildings`;
      grp.style.color = RACE_COLOR[race] + '70';
      list.appendChild(grp);
      buildings.forEach(b => list.appendChild(makeBuildingTree(b, lq, color, forceOpen)));
    }
  });
}

function filterAssets(v) { buildAssetPanel(v); }

// ─────────────────────────────────────────
// TIMELINE STATE
// ─────────────────────────────────────────
function overlaps(trackItems, startTime, duration, excludeId) {
  const end = startTime + duration;
  return trackItems.some(it => {
    if (it.id === excludeId) return false;
    return startTime < it.startTime + it.buildTime && end > it.startTime;
  });
}

function addItem(dataItem) {
  // Find first track where item fits at t=0
  for (let ti = 0; ti < tracks.length; ti++) {
    if (!overlaps(tracks[ti], 0, dataItem.buildTime, null)) {
      placeItem(dataItem, ti, 0);
      return;
    }
  }
  // All tracks occupied at t=0 — create new track
  tracks.push([]);
  placeItem(dataItem, tracks.length - 1, 0);
}

function placeItem(dataItem, ti, startTime) {
  const item = {
    id: nextId++,
    name: dataItem.name, race: dataItem.race, type: dataItem.type,
    buildTime: dataItem.buildTime, mineralCost: dataItem.mineralCost,
    gasCost: dataItem.gasCost, supplyCost: dataItem.supplyCost,
    startTime, trackIndex: ti,
  };
  tracks[ti].push(item);
  render();
  saveURL();
}

function removeItem(id) {
  for (let ti = 0; ti < tracks.length; ti++) {
    const idx = tracks[ti].findIndex(it => it.id === id);
    if (idx === -1) continue;
    tracks[ti].splice(idx, 1);
    pruneEmptyTracks();
    render();
    saveURL();
    return;
  }
}

function pruneEmptyTracks() {
  while (tracks.length > 1 && tracks[tracks.length - 1].length === 0) tracks.pop();
}

// ─────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────
function render(skipBO = false) {
  const range = timeRange();
  TL_MIN = range.min;
  const W = (range.max - range.min) * PPS;
  document.getElementById('tl-inner').style.width   = W + 'px';
  document.getElementById('ruler').style.width      = W + 'px';
  document.getElementById('supply-row').style.width = W + 'px';
  document.getElementById('tracks').style.width     = W + 'px';
  renderRuler(range);
  renderSupplyRow(range, W);
  renderTracks();
  renderLabels();
  if (!skipBO) updateBO();
  document.getElementById('zoom-info').textContent = PPS + 'px/s';
}

function renderRuler(range) {
  const ruler = document.getElementById('ruler');
  ruler.innerHTML = '';

  const maj = PPS >= 18 ? 10 : PPS >= 8 ? 15 : PPS >= 5 ? 30 : 60;
  const min = PPS >= 18 ? 5  : PPS >= 8 ? 5  : PPS >= 5 ? 10 : 30;

  // Snap start to a multiple of min
  const startS = Math.floor(range.min / min) * min;
  for (let s = startS; s <= range.max; s += min) {
    const x = (s - range.min) * PPS;
    const isMaj = s % maj === 0;
    const tick = document.createElement('div');
    tick.className = 'tick' + (isMaj ? ' major' : '');
    tick.style.left   = x + 'px';
    tick.style.height = isMaj ? '100%' : '35%';
    ruler.appendChild(tick);
    if (isMaj) {
      const lbl = document.createElement('div');
      lbl.className = 'tick-label';
      lbl.style.left = x + 'px';
      lbl.textContent = fmt(s);
      ruler.appendChild(lbl);
    }
  }

  // t=0 marker (only when timeline has negative region)
  if (range.min < 0) {
    const x0 = (0 - range.min) * PPS;
    const z = document.createElement('div');
    z.className = 'tick-zero';
    z.style.left = x0 + 'px';
    ruler.appendChild(z);
    const zl = document.createElement('div');
    zl.className = 'tick-zero-label';
    zl.style.left = x0 + 'px';
    zl.textContent = '0:00';
    ruler.appendChild(zl);
  }
}

function renderTracks() {
  const container = document.getElementById('tracks');
  container.innerHTML = '';
  tracks.forEach((items, ti) => {
    const row = document.createElement('div');
    row.className = 'track-row';
    row.dataset.ti = ti;
    items.forEach(item => row.appendChild(makeBlock(item)));
    container.appendChild(row);
  });
}

function renderLabels() {
  const list = document.getElementById('label-list');
  list.innerHTML = '';
  tracks.forEach((_, ti) => {
    const cell = document.createElement('div');
    cell.className = 'label-cell';
    cell.textContent = `T${ti + 1}`;
    list.appendChild(cell);
  });
}

function renderSupplyRow(range, W) {
  const row = document.getElementById('supply-row');
  row.innerHTML = '';

  const items = tracks.flat();
  if (!items.length) return;

  // Build list of supply events
  const events = [];
  items.forEach(it => {
    // Supply consumed: when a unit starts (its queue-up moment)
    if (it.type === 'Unit' && it.supplyCost > 0) {
      events.push({ t: it.startTime, used: it.supplyCost, cap: 0 });
    }
    // Supply provided: when a supply structure/unit completes
    const capGiven = SUPPLY_CAP[it.name] || 0;
    if (capGiven > 0) {
      events.push({ t: it.startTime + it.buildTime, used: 0, cap: capGiven });
    }
  });

  if (!events.length) return;

  // Sort and compute running totals at each event time
  events.sort((a, b) => a.t - b.t);
  const points = []; // { t, usedTotal, capTotal }
  let usedTotal = 0, capTotal = 0;
  // Add a baseline point at range.min
  points.push({ t: range.min, usedTotal: 0, capTotal: 0 });
  events.forEach(ev => {
    usedTotal += ev.used;
    capTotal  += ev.cap;
    points.push({ t: ev.t, usedTotal, capTotal });
  });
  // Add terminal point
  points.push({ t: range.max, usedTotal, capTotal });

  // Render a segment between each consecutive pair of points
  for (let i = 0; i < points.length - 1; i++) {
    const p    = points[i];
    const next = points[i + 1];
    const x    = (p.t    - range.min) * PPS;
    const xEnd = (next.t - range.min) * PPS;
    const segW = xEnd - x;
    if (segW < 1) continue;

    const ratio = p.capTotal > 0 ? p.usedTotal / p.capTotal : 0;
    const cls   = p.capTotal === 0 ? 'sup-zero'
                : ratio > 1         ? 'sup-over'
                : ratio >= 0.9      ? 'sup-warn'
                :                     'sup-ok';

    const seg = document.createElement('div');
    seg.className = `sup-seg ${cls}`;
    seg.style.left  = x + 'px';
    seg.style.width = segW + 'px';

    // Show label if wide enough
    if (segW > 28 && p.capTotal > 0) {
      seg.textContent = `${p.usedTotal}/${p.capTotal}`;
    }
    row.appendChild(seg);
  }
}

function makeBlock(item) {
  const bl = document.createElement('div');
  bl.className = 'bl';
  bl.dataset.id = item.id;
  bl.style.left    = ((item.startTime - TL_MIN) * PPS) + 'px';
  bl.style.width   = Math.max(item.buildTime * PPS - 2, 6) + 'px';
  bl.style.background = RACE_BG[item.race];
  bl.style.borderLeft = `2px ${item.type === 'Upgrade' ? 'dashed' : 'solid'} ${RACE_COLOR[item.race]}`;
  bl.style.color   = RACE_COLOR[item.race];
  if (item.type === 'Upgrade') bl.style.opacity = '0.85';

  const sp = document.createElement('span');
  sp.textContent = item.name;
  bl.appendChild(sp);

  bl.addEventListener('mousedown',  e => dragStart(e, item));
  bl.addEventListener('mouseenter', e => tipShow(e, item));
  bl.addEventListener('mousemove',  tipMove);
  bl.addEventListener('mouseleave', tipHide);
  bl.addEventListener('contextmenu', e => { e.preventDefault(); ctxShow(e, item.id); });

  return bl;
}

// ─────────────────────────────────────────
// DRAG
// ─────────────────────────────────────────
const ghost = document.getElementById('ghost');
let drag = null;

function dragStart(e, item) {
  if (e.button !== 0) return;
  e.preventDefault();
  tipHide();

  const blEl = e.currentTarget;
  const rect  = blEl.getBoundingClientRect();
  const offX  = e.clientX - rect.left;

  // Style ghost
  ghost.style.display    = 'flex';
  ghost.style.width      = blEl.style.width;
  ghost.style.background = blEl.style.background;
  ghost.style.borderLeft = blEl.style.borderLeft;
  ghost.style.color      = blEl.style.color;
  ghost.innerHTML = `<span id="ghost-name">${item.name}</span><span id="ghost-time"></span>`;

  blEl.style.opacity = '0.25';

  drag = { item, blEl, offX };

  document.addEventListener('mousemove', dragMove);
  document.addEventListener('mouseup',   dragEnd);
}

function dragMove(e) {
  if (!drag) return;
  const { item, offX } = drag;

  const scroll    = document.getElementById('tl-scroll');
  const tracksEl  = document.getElementById('tracks');
  const tracksRect = tracksEl.getBoundingClientRect();
  const scrollRect = scroll.getBoundingClientRect();

  // Compute snapped time (allow negative)
  const relX   = e.clientX - tracksRect.left + scroll.scrollLeft - offX;
  const secRaw = relX / PPS + TL_MIN;
  const sec    = Math.round(secRaw);

  // Compute target track
  const relY = e.clientY - tracksRect.top + scroll.scrollTop;
  const ti   = Math.max(0, Math.min(tracks.length, Math.floor(relY / TRACK_H)));

  drag.previewSec   = sec;
  drag.previewTrack = ti;

  // Position ghost on screen (snapped)
  const ghostX = tracksRect.left - scroll.scrollLeft + (sec - TL_MIN) * PPS;
  const ghostY = tracksRect.top  - scroll.scrollTop  + Math.min(ti, tracks.length - 1) * TRACK_H + 3;
  ghost.style.left = ghostX + 'px';
  ghost.style.top  = ghostY + 'px';

  // Live time label
  const ghostTimeEl = document.getElementById('ghost-time');
  if (ghostTimeEl) ghostTimeEl.textContent = `${fmt(sec)} → ${fmt(sec + item.buildTime)}`;

  // Auto-scroll
  if (e.clientX > scrollRect.right  - 50) scroll.scrollLeft += 10;
  if (e.clientX < scrollRect.left   + 50) scroll.scrollLeft -= 10;
  if (e.clientY > scrollRect.bottom - 40) scroll.scrollTop  += 10;
  if (e.clientY < scrollRect.top    + 40) scroll.scrollTop  -= 10;
}

function dragEnd() {
  if (!drag) return;
  const { item, blEl } = drag;
  const newSec   = drag.previewSec   ?? item.startTime;
  let   newTrack = drag.previewTrack ?? item.trackIndex;

  // Remove from original track
  tracks[item.trackIndex] = tracks[item.trackIndex].filter(i => i.id !== item.id);

  // Extend tracks array if dropped below existing tracks
  while (tracks.length <= newTrack) tracks.push([]);

  // Validate & place
  if (!overlaps(tracks[newTrack], newSec, item.buildTime, item.id)) {
    item.startTime   = newSec;
    item.trackIndex  = newTrack;
  } else {
    // Revert to original
    item.trackIndex = drag.item.trackIndex; // already mutated so re-use backup
    newTrack = item.trackIndex;
  }
  tracks[item.trackIndex].push(item);
  pruneEmptyTracks();

  ghost.style.display = 'none';
  blEl.style.opacity  = '';
  drag = null;
  document.removeEventListener('mousemove', dragMove);
  document.removeEventListener('mouseup',   dragEnd);

  render();
  saveURL();
}

// ─────────────────────────────────────────
// TOOLTIP
// ─────────────────────────────────────────
const tip = document.getElementById('tip');

function tipShow(e, item) {
  const endTime = item.startTime + item.buildTime;

    `<span style="color:#444">build time &nbsp;${item.buildTime}s</span><br>` +
    `Minerals &nbsp;<b style="color:#ddd">${item.mineralCost}</b> &nbsp; Gas &nbsp;<b style="color:#ddd">${item.gasCost}</b>${sup}`;
  tip.style.display = 'block';

}
function tipMove(e) {

// ─────────────────────────────────────────
// BUILD ORDER
// ─────────────────────────────────────────
function updateBO() {
  const all = tracks.flat().sort((a, b) => a.startTime - b.startTime || a.trackIndex - b.trackIndex);
  const multiTrack = tracks.filter(t => t.length > 0).length > 1;
  document.getElementById('bo-text').value =
    all.map(it => {
      const prefix = multiTrack ? `(${it.trackIndex + 1}) ` : '';
      return `${prefix}${fmt(it.startTime)}  ${it.name}`;
    }).join('\n');
}

function fmt(s) {
  const neg = s < 0;
  const abs = Math.abs(s);
  const m   = Math.floor(abs / 60);
  const sec = String(Math.floor(abs % 60)).padStart(2, '0');
  return (neg ? '-' : '') + `${m}:${sec}`;
}

function copyBO(btn) {
  const ta = document.getElementById('bo-text');
  ta.select(); document.execCommand('copy');
  btn.textContent = 'Copied!';
  setTimeout(() => btn.textContent = 'Copy', 1200);
}

// ─────────────────────────────────────────
// ZOOM
// ─────────────────────────────────────────
function zoom(dir) {
  zoomIdx = Math.max(0, Math.min(ZOOM_STEPS.length - 1, zoomIdx + dir));
  PPS = ZOOM_STEPS[zoomIdx];
  render();
}

// ─────────────────────────────────────────
// URL ENCODE / DECODE
// ─────────────────────────────────────────
const LS_KEY = 'bw-build-order';

function saveURL() {
  const flat = [];
  tracks.forEach((tr, ti) => tr.forEach(it => flat.push({ n: it.name, t: it.startTime, r: ti })));
  const encoded = btoa(JSON.stringify(flat));
  history.replaceState(null, '', '#' + encoded);
  try { localStorage.setItem(LS_KEY, encoded); } catch {}
}

function decodeState(encoded) {
  const flat = JSON.parse(atob(encoded));
  tracks = [];
  flat.forEach(entry => {
    while (tracks.length <= entry.r) tracks.push([]);
    const src = DATA.find(d => d.name === entry.n);
    if (!src) return;
    tracks[entry.r].push({
      id: nextId++, name: src.name, race: src.race, type: src.type,
      buildTime: src.buildTime, mineralCost: src.mineralCost,
      gasCost: src.gasCost, supplyCost: src.supplyCost,
      startTime: entry.t, trackIndex: entry.r,
    });
  });
  if (!tracks.length) tracks = [[]];
}

function loadURL() {
  // URL hash takes priority (enables shareable links); fall back to localStorage
  const hash = location.hash.slice(1);
  const stored = hash || (() => { try { return localStorage.getItem(LS_KEY) || ''; } catch { return ''; } })();
  if (!stored) return;
  try { decodeState(stored); } catch { tracks = [[]]; }
}

// ─────────────────────────────────────────
// TOOLBAR ACTIONS
// ─────────────────────────────────────────
function clearAll() {
  tracks = [[]]; render(); saveURL();
}

function copyLink(btn) {
  navigator.clipboard.writeText(location.href).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy Link', 1400);
  });
}

// ─────────────────────────────────────────
const SAVES_KEY = 'bw-named-saves';

function getSaves() {
  try { return JSON.parse(localStorage.getItem(SAVES_KEY) || '{}'); } catch { return {}; }
}

function setSaves(obj) {
  try { localStorage.setItem(SAVES_KEY, JSON.stringify(obj)); } catch {}
}

function saveBuild() {
  const name = prompt('Save build as:');
  if (!name || !name.trim()) return;
  const flat = [];
  tracks.forEach((tr, ti) => tr.forEach(it => flat.push({ n: it.name, t: it.startTime, r: ti })));
  const encoded = btoa(JSON.stringify(flat));
  const saves = getSaves();
  saves[name.trim()] = encoded;
  setSaves(saves);
}

function loadBuild(name) {
  const saves = getSaves();
  if (!saves[name]) return;
  try {
    decodeState(saves[name]);
    render();
    saveURL();
  } catch {}
  closeSavesPanel();
}

function deleteSave(name) {
  const saves = getSaves();
  delete saves[name];
  setSaves(saves);
  renderSavesPanel();
}

let savesPanelOpen = false;
function toggleSavesPanel(btn) {

  const panel = document.getElementById('saves-panel');

  panel.style.top  = (rect.bottom + 4) + 'px';
  panel.style.right = (window.innerWidth - rect.right) + 'px';

}

function renderSavesPanel() {

// ─────────────────────────────────────────
// BUILD ORDER — TWO-WAY SYNC
// ─────────────────────────────────────────

// Parse M:SS → total seconds. Returns null if invalid.
function parseTime(str) {
  const m = str.match(/^(-?)(\d+):(\d{2})$/);
  if (!m) return null;
  const val = parseInt(m[2]) * 60 + parseInt(m[3]);
  return m[1] === '-' ? -val : val;
}

// Parse all lines in the textarea and rebuild the timeline.
// Called with a debounce so we don't re-render on every keystroke.
let boDebounce = null;
function onBOInput() {
  acUpdate();
  clearTimeout(boDebounce);
  boDebounce = setTimeout(parseAndApply, 380);
}

function parseAndApply() {
  const ta   = document.getElementById('bo-text');
  const lines = ta.value.split('\n');

  const parsed = [];
  lines.forEach(line => {
    const raw = line.trim();
    if (!raw) return;
    // Accept: "(N) M:SS Name [-> Name2 -> Name3]"  (negative times, optional track)
    const m = raw.match(/^(?:\((\d+)\)\s+)?(-?\d+:\d{2})\s+(.+)$/);
    if (!m) return;
    const trackHint = m[1] != null ? parseInt(m[1]) - 1 : null; // 1-indexed → 0-indexed
    const secs = parseTime(m[2]);
    if (secs === null) return;
    // Split chained names by ->
    const names = m[3].split(/\s*->\s*/);
    let chainTime = secs;
    for (const rawName of names) {
      const name = rawName.trim();
      const src  = DATA.find(d => d.name.toLowerCase() === name.toLowerCase());
      if (!src) break; // stop chain on unknown name
      parsed.push({ src, startTime: chainTime, trackHint });
      chainTime += src.buildTime;
    }
  });

  // Sort by start time for greedy track assignment
  parsed.sort((a, b) => a.startTime - b.startTime);

  // Rebuild tracks
  tracks  = [[]];
  nextId  = 0;
  parsed.forEach(({ src, startTime, trackHint }) => {
    if (trackHint !== null) {
      while (tracks.length <= trackHint) tracks.push([]);
      tracks[trackHint].push(makeItemObj(src, trackHint, startTime));
    } else {
      let placed = false;
      for (let ti = 0; ti < tracks.length; ti++) {
        if (!overlaps(tracks[ti], startTime, src.buildTime, null)) {
          tracks[ti].push(makeItemObj(src, ti, startTime));
          placed = true;
          break;
        }
      }
      if (!placed) {
        const ti = tracks.length;
        tracks.push([makeItemObj(src, ti, startTime)]);
      }
    }
  });

  pruneEmptyTracks();
  render(true);  // skipBO=true — don't overwrite textarea
  saveURL();
}

function makeItemObj(src, ti, startTime) {
  return {
    id: nextId++, name: src.name, race: src.race, type: src.type,
    buildTime: src.buildTime, mineralCost: src.mineralCost,
    gasCost: src.gasCost, supplyCost: src.supplyCost,
    startTime, trackIndex: ti,
  };
}

// ─────────────────────────────────────────
// AUTOCOMPLETE
// ─────────────────────────────────────────
const acEl  = document.getElementById('ac');
const mirEl = document.getElementById('ta-mirror');
let acSuggestions = [];
let acIdx = -1;

// Called on every keystroke — show/update or hide autocomplete
function acUpdate() {
  const ta  = document.getElementById('bo-text');
  const pos = ta.selectionStart;
  const val = ta.value;

  // Get current line up to cursor
  const lineStart = val.lastIndexOf('\n', pos - 1) + 1;
  const lineUpTo  = val.slice(lineStart, pos);

  // Strip optional track hint + timestamp prefix; bail if line doesn't have one
  const lineBody = lineUpTo.replace(/^(?:\(\d+\)\s+)?-?\d+:\d{2}\s+/, '');
  if (lineBody === lineUpTo) { acHide(); return; }

  // Fragment being typed is everything after the last ->
  const arrowIdx = lineBody.lastIndexOf('->');
  const typed = arrowIdx >= 0 ? lineBody.slice(arrowIdx + 2).replace(/^\s+/, '') : lineBody;
  if (!typed) { acHide(); return; }

  const lq = typed.toLowerCase();
  acSuggestions = DATA.filter(d => d.name.toLowerCase().startsWith(lq));
  if (!acSuggestions.length) { acHide(); return; }

  acIdx = 0;
  acRender();
  acPosition(ta, pos);
}

function acRender() {
  acEl.innerHTML = '';
  acSuggestions.slice(0, 9).forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'ac-item' + (i === acIdx ? ' ac-sel' : '');
    row.innerHTML =
      `<span class="dot" style="background:${RACE_COLOR[item.race]};flex-shrink:0"></span>` +
      `<span>${item.name}</span>` +
      `<span class="ac-race">${item.race}</span>` +
      `<span class="ac-time">${item.buildTime}s</span>`;
    row.onmousedown = e => { e.preventDefault(); acCommit(i); };
    acEl.appendChild(row);
  });
  acEl.style.display = 'block';
}

// Position the dropdown near the cursor using the mirror div trick
function acPosition(ta, pos) {
  const taRect = ta.getBoundingClientRect();
  const cs     = getComputedStyle(ta);

  mirEl.style.width      = taRect.width + 'px';
  mirEl.style.top        = taRect.top + 'px';
  mirEl.style.left       = taRect.left + 'px';
  mirEl.style.paddingTop = cs.paddingTop;
  mirEl.style.paddingLeft = cs.paddingLeft;

  // Fill mirror up to cursor, append a marker span
  const before = document.createTextNode(ta.value.slice(0, pos));
  const marker = document.createElement('span');
  marker.textContent = '\u200b'; // zero-width space
  mirEl.innerHTML = '';
  mirEl.appendChild(before);
  mirEl.appendChild(marker);

  const mRect = marker.getBoundingClientRect();
  let x = mRect.left;
  let y = mRect.bottom + 2;

  // Clamp so dropdown doesn't go off screen
  const acW = 220;
  if (x + acW > window.innerWidth) x = window.innerWidth - acW - 8;

  acEl.style.left = x + 'px';
  acEl.style.top  = y + 'px';
}

function acHide() {
  acEl.style.display = 'none';
  acSuggestions = [];
  acIdx = -1;
}

function acCommit(idx) {
  const item = acSuggestions[idx];
  if (!item) return;

  const ta  = document.getElementById('bo-text');
  const pos = ta.selectionStart;
  const val = ta.value;

  const lineStart = val.lastIndexOf('\n', pos - 1) + 1;
  const lineUpTo  = val.slice(lineStart, pos);

  // Strip track hint + timestamp prefix to get the body
  const bodyMatch = lineUpTo.match(/^(?:\(\d+\)\s+)?-?\d+:\d{2}\s+/);
  if (!bodyMatch) return;
  const bodyStart = lineStart + bodyMatch[0].length;
  const bodyUpTo  = val.slice(bodyStart, pos);

  // Replace only the fragment after the last -> (or the whole body if no ->)
  const arrowIdx = bodyUpTo.lastIndexOf('->');
  const replaceStart = arrowIdx >= 0
    ? bodyStart + arrowIdx + 2 + (bodyUpTo.slice(arrowIdx + 2).match(/^\s*/)[0].length)
    : bodyStart;
  const newVal = val.slice(0, replaceStart) + item.name + val.slice(pos);
  ta.value = newVal;
  const newPos = replaceStart + item.name.length;
  ta.setSelectionRange(newPos, newPos);

  acHide();
  // Trigger parse after short delay so user can see the completed text
  clearTimeout(boDebounce);
  boDebounce = setTimeout(parseAndApply, 100);
}

// Keyboard handling for autocomplete + normal editing
function onBOKey(e) {
  const open = acEl.style.display !== 'none' && acSuggestions.length;

  if (open) {
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      acIdx = Math.min(acIdx + 1, Math.min(acSuggestions.length, 9) - 1);
      acRender();
      acPosition(document.getElementById('bo-text'), document.getElementById('bo-text').selectionStart);
      return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      acIdx = Math.max(acIdx - 1, 0);
      acRender();
      acPosition(document.getElementById('bo-text'), document.getElementById('bo-text').selectionStart);
      return;
    }
    if (e.key === 'Tab' || e.key === 'Enter') {
      e.preventDefault();
      acCommit(acIdx);
      return;
    }
    if (e.key === 'Escape') {
      acHide();
      return;
    }
  }

  // Enter on a new line when no autocomplete: insert timestamp template
  if (e.key === 'Enter' && !open) {
    // Let browser handle the newline, then prepend a hint on next line
    // (no action needed — user types the time manually)
  }
}

// Hide autocomplete when clicking outside
document.addEventListener('mousedown', e => {
  if (!e.target.closest('#ac') && !e.target.closest('#bo-text')) acHide();
});

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
loadURL();
buildAssetPanel();
render();
</script>
</body>
